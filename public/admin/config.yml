backend:
  name: git-gateway
  branch: main

# Configuración explícita para modo local
local_backend:
  url: http://localhost:8081/api/v1

media_folder: "public/assets/img"
public_folder: "/assets/img"

collections:
  - name: "config"
    label: "⚙️ Configuración Web"
    delete: false
    files:
      - name: "home"
        label: "Contenido General"
        file: "public/content/site_data.json"
        fields:
          - {label: "Cabecera (Hero)", name: "hero", widget: "object", fields: [
              {label: "Título", name: "title", widget: "string"},
              {label: "Texto", name: "text", widget: "text"}
            ]}
          - {label: "FAQ", name: "faq", widget: "list", fields: [
              {label: "Pregunta", name: "question", widget: "string"},
              {label: "Respuesta", name: "answer", widget: "text"}
            ]}
          - {label: "Redes Sociales", name: "social", widget: "object", fields: [
              {label: "Instagram", name: "instagram", widget: "string"},
              {label: "X", name: "x", widget: "string"},
              {label: "Facebook", name: "facebook", widget: "string"}
            ]}
          - {label: "Contacto", name: "contact", widget: "object", fields: [
              {label: "Email", name: "email", widget: "string"},
              {label: "Ubicación", name: "location", widget: "string"}
            ]}

  - name: "noticias_panel"
    label: "📰 Noticias y Prensa"
    delete: false
    files:
      - name: "archivo"
        label: "Archivo de Noticias"
        file: "public/content/site_data.json"
        fields:
          - label: "Listado de Noticias"
            name: "news"
            widget: "list"
            summary: '{{title}} ({{date}})'
            fields:
              - {label: "Título", name: "title", widget: "string"}
              - {label: "URL", name: "url", widget: "string"}
              - {label: "Imagen", name: "image", widget: "image"}
              - {label: "Fecha", name: "date", widget: "datetime", format: "YYYY-MM-DD"}
